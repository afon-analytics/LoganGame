<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Platform Adventure - Demo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #90EE90 70%, #90EE90 100%);
            overflow: hidden;
            image-rendering: pixelated;
        }
        
        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        #characterSelect {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 10px;
            border: 4px solid #FFD700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            text-align: center;
            max-width: 740px;
        }
        
        #characterSelect h1 {
            color: #FFD700;
            font-size: 24px;
            margin-bottom: 30px;
            text-shadow: 3px 3px 0 #FF1493;
        }
        
        .characterGrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .character {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid #4a4a6a;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .character:hover {
            transform: translateY(-5px);
            border-color: #FFD700;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
        
        .character.selected {
            border-color: #00FF00;
            background: linear-gradient(135deg, #2a3a4e 0%, #263a5e 100%);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
        }
        
        .characterSprite {
            width: 160px;
            height: 160px;
            margin: 0 auto 10px;
            image-rendering: pixelated;
        }
        
        .character h3 {
            color: #fff;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .character p {
            color: #aaa;
            font-size: 8px;
        }
        
        #startButton {
            background: linear-gradient(135deg, #FF1493 0%, #FF4500 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 #8B0045;
        }
        
        #startButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #8B0045;
        }
        
        #startButton:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8B0045;
        }
        
        #startButton:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: 0 4px 0 #333;
        }
        
        #gameCanvas {
            display: none;
            border: 8px solid #000;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            image-rendering: pixelated;
        }
        
        #hud {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            color: white;
            font-size: 14px;
            text-shadow: 2px 2px 0 #000;
            z-index: 100;
        }
        
        #lives {
            float: right;
            color: #FF6B6B;
        }
        
        #instructions {
            background: rgba(0, 0, 0, 0.75);
            padding: 20px;
            border-radius: 8px;
            border: 3px solid #FFD700;
            margin-top: 20px;
            max-width: 600px;
            color: #fff;
            font-size: 10px;
            line-height: 1.8;
        }
        
        #instructions h3 {
            color: #FFD700;
            margin-bottom: 15px;
            font-size: 12px;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        
        .control-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 4px;
        }
        
        .key {
            color: #00FF00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="characterSelect">
            <h1>SELECT YOUR HERO</h1>
            <div class="characterGrid">
                <div class="character" data-character="mario">
                    <canvas id="marioSprite" class="characterSprite"></canvas>
                    <h3>MARIO</h3>
                    <p>Classic Hero</p>
                </div>
                <div class="character" data-character="luigi">
                    <canvas id="luigiSprite" class="characterSprite"></canvas>
                    <h3>LUIGI</h3>
                    <p>Green Machine</p>
                </div>
                <div class="character" data-character="donkey">
                    <canvas id="donkeySprite" class="characterSprite"></canvas>
                    <h3>DONKEY KONG</h3>
                    <p>Power Player</p>
                </div>
            </div>
            <button id="startButton" disabled>START GAME</button>
            
            <div id="instructions">
                <h3>CONTROLS</h3>
                <div class="controls">
                    <div class="control-item"><span class="key">←→</span> Move</div>
                    <div class="control-item"><span class="key">SPACE</span> Jump</div>
                    <div class="control-item"><span class="key">↓</span> Duck</div>
                    <div class="control-item"><span class="key">SPACE (wall)</span> Wall Jump</div>
                </div>
                <p style="margin-top: 15px;">Jump on enemies to defeat them! Reach the flagpole to win!</p>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    
    <div id="hud">
        <span id="world">WORLD 1-1</span>
        <span id="score" style="position:absolute;left:50%;transform:translateX(-50%)">SCORE 0</span>
        <span id="lives">❤️❤️❤️</span>
    </div>

    <script>
        // Draw detailed pixel art sprites for characters
        function drawMario(canvas) {
            canvas.width = 160;
            canvas.height = 160;
            const ctx = canvas.getContext('2d');
            const cx = 80;

            // === HAT ===
            // Hat brim (wider, darker shadow band)
            ctx.fillStyle = '#AA0000';
            ctx.fillRect(cx - 38, 34, 76, 12);
            // Hat crown
            ctx.fillStyle = '#CC0000';
            ctx.fillRect(cx - 26, 10, 52, 28);
            // Hat crown shadow on side
            ctx.fillStyle = '#990000';
            ctx.fillRect(cx + 18, 10, 8, 28);
            // Hat shine highlight
            ctx.fillStyle = '#FF4444';
            ctx.fillRect(cx - 22, 12, 16, 8);
            // M logo on hat (gold)
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(cx - 10, 15, 3, 13); // left upstroke
            ctx.fillRect(cx - 7,  15, 3,  6); // left inner top
            ctx.fillRect(cx - 4,  21, 6,  7); // center V
            ctx.fillRect(cx + 2,  15, 3,  6); // right inner top
            ctx.fillRect(cx + 5,  15, 3, 13); // right upstroke

            // === HEAD ===
            ctx.fillStyle = '#FFDBAC';
            ctx.beginPath();
            ctx.arc(cx, 60, 22, 0, Math.PI * 2);
            ctx.fill();
            // Ears
            ctx.beginPath();
            ctx.arc(cx - 22, 60, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 22, 60, 7, 0, Math.PI * 2);
            ctx.fill();
            // Inner ear shading
            ctx.fillStyle = '#E8A87C';
            ctx.beginPath();
            ctx.arc(cx - 22, 60, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 22, 60, 4, 0, Math.PI * 2);
            ctx.fill();

            // === EYEBROWS ===
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(cx - 18, 47, 14, 4);
            ctx.fillRect(cx + 4,  47, 14, 4);

            // === EYES ===
            // Whites
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(cx - 17, 51, 13, 10);
            ctx.fillRect(cx + 4,  51, 13, 10);
            // Blue irises
            ctx.fillStyle = '#3355EE';
            ctx.fillRect(cx - 14, 53,  8, 7);
            ctx.fillRect(cx + 6,  53,  8, 7);
            // Pupils
            ctx.fillStyle = '#000000';
            ctx.fillRect(cx - 13, 54,  5, 5);
            ctx.fillRect(cx + 7,  54,  5, 5);
            // Eye shine
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(cx - 12, 54,  2, 2);
            ctx.fillRect(cx + 8,  54,  2, 2);

            // === NOSE ===
            ctx.fillStyle = '#E8A87C';
            ctx.beginPath();
            ctx.arc(cx, 67, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFDBAC';
            ctx.fillRect(cx - 3, 62, 6, 4);

            // === MUSTACHE ===
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.ellipse(cx - 11, 77, 13, 7, -0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 11, 77, 13, 7, 0.15, 0, Math.PI * 2);
            ctx.fill();
            // Cover center gap with skin
            ctx.fillStyle = '#FFDBAC';
            ctx.fillRect(cx - 5, 71, 10, 6);

            // === NECK ===
            ctx.fillStyle = '#FFDBAC';
            ctx.fillRect(cx - 8, 80, 16, 8);

            // === RED SHIRT BODY ===
            ctx.fillStyle = '#FF2222';
            ctx.fillRect(cx - 28, 86, 56, 38);
            // Shadow on shirt sides
            ctx.fillStyle = '#CC0000';
            ctx.fillRect(cx - 28, 86, 9, 38);
            ctx.fillRect(cx + 19, 86, 9, 38);
            // Shirt highlight
            ctx.fillStyle = '#FF5555';
            ctx.fillRect(cx - 18, 88, 9, 34);

            // === OVERALL STRAPS (blue) ===
            ctx.fillStyle = '#1133BB';
            ctx.fillRect(cx - 16, 86, 11, 38);
            ctx.fillRect(cx + 5,  86, 11, 38);
            // Strap shading
            ctx.fillStyle = '#0D27A0';
            ctx.fillRect(cx - 16, 86,  3, 38);
            ctx.fillRect(cx + 13, 86,  3, 38);
            // Gold buckles
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(cx - 16, 98, 11,  7);
            ctx.fillRect(cx + 5,  98, 11,  7);
            // Buckle detail
            ctx.fillStyle = '#AA8800';
            ctx.fillRect(cx - 14, 100,  7, 3);
            ctx.fillRect(cx + 7,  100,  7, 3);

            // === OVERALLS BIB ===
            ctx.fillStyle = '#2244CC';
            ctx.fillRect(cx - 14, 108, 28, 16);
            // Pocket stitch lines
            ctx.strokeStyle = '#1133BB';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(cx - 11, 111, 22, 10);

            // === ARMS ===
            ctx.fillStyle = '#FFDBAC';
            ctx.fillRect(cx - 46, 90, 20, 30);
            ctx.fillRect(cx + 26, 90, 20, 30);
            // Sleeves (red)
            ctx.fillStyle = '#FF2222';
            ctx.fillRect(cx - 46, 90, 20, 10);
            ctx.fillRect(cx + 26, 90, 20, 10);
            // Sleeve cuff shadow
            ctx.fillStyle = '#CC0000';
            ctx.fillRect(cx - 46, 96, 20,  4);
            ctx.fillRect(cx + 26, 96, 20,  4);

            // === GLOVES (white) ===
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(cx - 36, 124, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 36, 124, 12, 0, Math.PI * 2);
            ctx.fill();
            // Glove seam / cuff ring
            ctx.strokeStyle = '#CCCCCC';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx - 36, 124, 10, Math.PI + 0.4, Math.PI * 2 - 0.4);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx + 36, 124, 10, Math.PI + 0.4, Math.PI * 2 - 0.4);
            ctx.stroke();
            // Knuckle lines
            ctx.strokeStyle = '#AAAAAA';
            ctx.lineWidth = 1;
            for (let i = -1; i <= 1; i++) {
                ctx.beginPath();
                ctx.moveTo(cx - 36 + i * 5, 114);
                ctx.lineTo(cx - 36 + i * 4, 119);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + 36 + i * 5, 114);
                ctx.lineTo(cx + 36 + i * 4, 119);
                ctx.stroke();
            }

            // === LEGS / OVERALLS ===
            ctx.fillStyle = '#1133BB';
            ctx.fillRect(cx - 26, 122, 22, 28);
            ctx.fillRect(cx + 4,  122, 22, 28);
            // Leg shadows
            ctx.fillStyle = '#0D27A0';
            ctx.fillRect(cx - 26, 122,  6, 28);
            ctx.fillRect(cx + 20, 122,  6, 28);
            // Crotch seam
            ctx.fillStyle = '#0D27A0';
            ctx.fillRect(cx - 3, 122,  6, 5);

            // === SHOES ===
            ctx.fillStyle = '#6B3A2A';
            ctx.fillRect(cx - 30, 146, 30, 12);
            ctx.fillRect(cx,      146, 30, 12);
            // Shoe highlight
            ctx.fillStyle = '#8B5A3A';
            ctx.fillRect(cx - 28, 148, 12, 4);
            ctx.fillRect(cx + 2,  148, 12, 4);
            // Sole (darker, slightly wider)
            ctx.fillStyle = '#3D1F10';
            ctx.fillRect(cx - 32, 154, 32, 6);
            ctx.fillRect(cx,      154, 32, 6);
        }
        
        function drawLuigi(canvas) {
            canvas.width = 160;
            canvas.height = 160;
            const ctx = canvas.getContext('2d');
            const cx = 80;

            // === HAT (dark green) ===
            ctx.fillStyle = '#1A4A1A';
            ctx.fillRect(cx - 38, 34, 76, 12); // brim
            ctx.fillStyle = '#2D7A2D';
            ctx.fillRect(cx - 26,  8, 52, 30); // crown (slightly taller for Luigi)
            // Crown shadow
            ctx.fillStyle = '#1A5A1A';
            ctx.fillRect(cx + 18,  8,  8, 30);
            // Crown highlight
            ctx.fillStyle = '#44AA44';
            ctx.fillRect(cx - 22, 10, 16,  8);
            // L logo on hat (gold)
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(cx - 5, 13,  3, 14); // vertical stroke
            ctx.fillRect(cx - 5, 24,  9,  3); // horizontal foot

            // === HEAD ===
            ctx.fillStyle = '#FFDBAC';
            ctx.beginPath();
            ctx.arc(cx, 60, 22, 0, Math.PI * 2);
            ctx.fill();
            // Ears
            ctx.beginPath();
            ctx.arc(cx - 22, 60, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 22, 60, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#E8A87C';
            ctx.beginPath();
            ctx.arc(cx - 22, 60, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 22, 60, 4, 0, Math.PI * 2);
            ctx.fill();

            // === EYEBROWS ===
            ctx.fillStyle = '#5A3010';
            ctx.fillRect(cx - 18, 47, 14, 4);
            ctx.fillRect(cx + 4,  47, 14, 4);

            // === EYES ===
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(cx - 17, 51, 13, 10);
            ctx.fillRect(cx + 4,  51, 13, 10);
            // Brown irises (Luigi has brown eyes)
            ctx.fillStyle = '#6B3A10';
            ctx.fillRect(cx - 14, 53,  8, 7);
            ctx.fillRect(cx + 6,  53,  8, 7);
            ctx.fillStyle = '#000000';
            ctx.fillRect(cx - 13, 54,  5, 5);
            ctx.fillRect(cx + 7,  54,  5, 5);
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(cx - 12, 54,  2, 2);
            ctx.fillRect(cx + 8,  54,  2, 2);

            // === NOSE ===
            ctx.fillStyle = '#E8A87C';
            ctx.beginPath();
            ctx.arc(cx, 67, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFDBAC';
            ctx.fillRect(cx - 3, 62, 6, 4);

            // === MUSTACHE (thinner than Mario's) ===
            ctx.fillStyle = '#5A3010';
            ctx.beginPath();
            ctx.ellipse(cx - 10, 77, 11, 6, -0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 10, 77, 11, 6, 0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFDBAC';
            ctx.fillRect(cx - 4, 72, 8, 5);

            // === NECK ===
            ctx.fillStyle = '#FFDBAC';
            ctx.fillRect(cx - 8, 80, 16, 8);

            // === GREEN SHIRT BODY ===
            ctx.fillStyle = '#009900';
            ctx.fillRect(cx - 28, 86, 56, 38);
            ctx.fillStyle = '#006600';
            ctx.fillRect(cx - 28, 86,  9, 38);
            ctx.fillRect(cx + 19, 86,  9, 38);
            ctx.fillStyle = '#44CC44';
            ctx.fillRect(cx - 18, 88,  9, 34);

            // === OVERALL STRAPS (blue) ===
            ctx.fillStyle = '#1133BB';
            ctx.fillRect(cx - 16, 86, 11, 38);
            ctx.fillRect(cx + 5,  86, 11, 38);
            ctx.fillStyle = '#0D27A0';
            ctx.fillRect(cx - 16, 86,  3, 38);
            ctx.fillRect(cx + 13, 86,  3, 38);
            // Gold buckles
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(cx - 16, 98, 11,  7);
            ctx.fillRect(cx + 5,  98, 11,  7);
            ctx.fillStyle = '#AA8800';
            ctx.fillRect(cx - 14, 100,  7, 3);
            ctx.fillRect(cx + 7,  100,  7, 3);

            // === BIB ===
            ctx.fillStyle = '#2244CC';
            ctx.fillRect(cx - 14, 108, 28, 16);
            ctx.strokeStyle = '#1133BB';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(cx - 11, 111, 22, 10);

            // === ARMS ===
            ctx.fillStyle = '#FFDBAC';
            ctx.fillRect(cx - 46, 90, 20, 30);
            ctx.fillRect(cx + 26, 90, 20, 30);
            // Sleeves (green)
            ctx.fillStyle = '#009900';
            ctx.fillRect(cx - 46, 90, 20, 10);
            ctx.fillRect(cx + 26, 90, 20, 10);
            ctx.fillStyle = '#006600';
            ctx.fillRect(cx - 46, 96, 20,  4);
            ctx.fillRect(cx + 26, 96, 20,  4);

            // === GLOVES ===
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(cx - 36, 124, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 36, 124, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#CCCCCC';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx - 36, 124, 10, Math.PI + 0.4, Math.PI * 2 - 0.4);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx + 36, 124, 10, Math.PI + 0.4, Math.PI * 2 - 0.4);
            ctx.stroke();
            ctx.strokeStyle = '#AAAAAA';
            ctx.lineWidth = 1;
            for (let i = -1; i <= 1; i++) {
                ctx.beginPath();
                ctx.moveTo(cx - 36 + i * 5, 114);
                ctx.lineTo(cx - 36 + i * 4, 119);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + 36 + i * 5, 114);
                ctx.lineTo(cx + 36 + i * 4, 119);
                ctx.stroke();
            }

            // === LEGS ===
            ctx.fillStyle = '#1133BB';
            ctx.fillRect(cx - 26, 122, 22, 28);
            ctx.fillRect(cx + 4,  122, 22, 28);
            ctx.fillStyle = '#0D27A0';
            ctx.fillRect(cx - 26, 122,  6, 28);
            ctx.fillRect(cx + 20, 122,  6, 28);
            ctx.fillRect(cx - 3,  122,  6,  5);

            // === SHOES (dark green for Luigi) ===
            ctx.fillStyle = '#1A4A1A';
            ctx.fillRect(cx - 30, 146, 30, 12);
            ctx.fillRect(cx,      146, 30, 12);
            ctx.fillStyle = '#2D7A2D';
            ctx.fillRect(cx - 28, 148, 12,  4);
            ctx.fillRect(cx + 2,  148, 12,  4);
            ctx.fillStyle = '#0D2A0D';
            ctx.fillRect(cx - 32, 154, 32,  6);
            ctx.fillRect(cx,      154, 32,  6);
        }
        
        function drawDonkeyKong(canvas) {
            canvas.width = 160;
            canvas.height = 160;
            const ctx = canvas.getContext('2d');
            const cx = 80;

            // === HEAD (large, dark brown) ===
            ctx.fillStyle = '#6B3A1A';
            ctx.beginPath();
            ctx.arc(cx, 44, 34, 0, Math.PI * 2);
            ctx.fill();
            // Heavy brow ridge
            ctx.fillStyle = '#4A2810';
            ctx.fillRect(cx - 28, 24, 56, 12);
            ctx.fillRect(cx - 24, 18, 48,  8);
            // Top of head fur bump
            ctx.fillStyle = '#5A3015';
            ctx.beginPath();
            ctx.arc(cx - 10, 14, 10, Math.PI, 0);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 10, 14, 10, Math.PI, 0);
            ctx.fill();

            // === FACE CENTER (lighter tan/cream oval) ===
            ctx.fillStyle = '#C8956A';
            ctx.beginPath();
            ctx.ellipse(cx, 52, 20, 24, 0, 0, Math.PI * 2);
            ctx.fill();

            // === EYES ===
            // Large white eye sclera
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(cx - 15, 36, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 15, 36, 10, 0, Math.PI * 2);
            ctx.fill();
            // Dark brown irises
            ctx.fillStyle = '#2A1005';
            ctx.beginPath();
            ctx.arc(cx - 14, 37,  7, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 14, 37,  7, 0, Math.PI * 2);
            ctx.fill();
            // Pupils
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(cx - 13, 38,  4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 13, 38,  4, 0, Math.PI * 2);
            ctx.fill();
            // Eye shine
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(cx - 11, 35,  2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 11, 35,  2, 0, Math.PI * 2);
            ctx.fill();

            // === NOSTRILS ===
            ctx.fillStyle = '#4A2810';
            ctx.beginPath();
            ctx.arc(cx - 8, 56, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 8, 56, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#2A1005';
            ctx.beginPath();
            ctx.arc(cx - 8, 56, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 8, 56, 2, 0, Math.PI * 2);
            ctx.fill();

            // === MOUTH / GRIN ===
            ctx.strokeStyle = '#4A2810';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(cx, 64, 13, 0.15, Math.PI - 0.15);
            ctx.stroke();
            // Teeth
            ctx.fillStyle = '#FFFFFF';

            ctx.fillRect(cx - 4,  62,  1, 7);
            ctx.fillRect(cx + 3,  62,  1, 7);

            ctx.fillRect(cx - 12, 76, 24, 10);

            // === BARREL CHEST ===
            ctx.fillStyle = '#6B3A1A';
            ctx.fillRect(cx - 36, 84, 72, 50);
            // Chest lighter fur center
            ctx.fillStyle = '#8B5A3A';
            ctx.beginPath();
            ctx.ellipse(cx, 104, 22, 26, 0, 0, Math.PI * 2);
            ctx.fill();
            // Fur texture lines on chest
            ctx.strokeStyle = '#6B3A1A';
            ctx.lineWidth = 1.5;
            for (let yy = 88; yy < 130; yy += 7) {
                ctx.beginPath();
                ctx.moveTo(cx - 20, yy);
                ctx.lineTo(cx - 10, yy + 3);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + 20, yy);
                ctx.lineTo(cx + 10, yy + 3);
                ctx.stroke();
            }
            // Chest shadow sides
            ctx.fillStyle = '#4A2810';
            ctx.fillRect(cx - 36, 84,  8, 50);
            ctx.fillRect(cx + 28, 84,  8, 50);

            // === RED TIE ===
            ctx.fillStyle = '#CC0000';
            ctx.fillRect(cx - 6, 84, 12, 30);
            // Tie knot (darker top)
            ctx.fillStyle = '#990000';
            ctx.fillRect(cx - 8, 84, 16,  9);
            // Knot highlight
            ctx.fillStyle = '#FF3333';
            ctx.fillRect(cx - 4, 85,  6,  4);
            // Tie point
            ctx.fillStyle = '#CC0000';
            ctx.beginPath();
            ctx.moveTo(cx - 6, 114);
            ctx.lineTo(cx,     124);
            ctx.lineTo(cx + 6, 114);
            ctx.fill();

            // === THICK ARMS ===
            ctx.fillStyle = '#6B3A1A';
            ctx.fillRect(cx - 62, 84, 28, 50);
            ctx.fillRect(cx + 34, 84, 28, 50);
            // Arm shadow
            ctx.fillStyle = '#4A2810';
            ctx.fillRect(cx - 62, 84,  7, 50);
            ctx.fillRect(cx + 55, 84,  7, 50);
            // Arm highlight
            ctx.fillStyle = '#8B5A3A';
            ctx.fillRect(cx - 52, 86,  8, 46);
            ctx.fillRect(cx + 34, 86,  8, 46);

            // === HANDS (large, lighter) ===
            ctx.fillStyle = '#C8956A';
            ctx.beginPath();
            ctx.arc(cx - 48, 138, 16, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 48, 138, 16, 0, Math.PI * 2);
            ctx.fill();
            // Knuckle lines
            ctx.strokeStyle = '#8B6040';
            ctx.lineWidth = 2;
            for (let i = -1; i <= 1; i++) {
                ctx.beginPath();
                ctx.moveTo(cx - 48 + i * 7, 123);
                ctx.lineTo(cx - 48 + i * 6, 130);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + 48 + i * 7, 123);
                ctx.lineTo(cx + 48 + i * 6, 130);
                ctx.stroke();

            ctx.fillStyle = '#B07850';
            ctx.beginPath();
            ctx.arc(cx - 48, 122,  7, Math.PI, 0);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 48, 122,  7, Math.PI, 0);
            ctx.fill();

            ctx.fillStyle = '#6B3A1A';
            ctx.fillRect(cx - 30, 132, 24, 22);
            ctx.fillRect(cx + 6,  132, 24, 22);

        }

        let fireballs = [];

        // Multi-level game state
        let gamePhase = 'playing'; // 'playing' | 'paused' | 'level_complete' | 'game_over' | 'game_won'
        let currentLevelIndex = 0;

        // Active level objects (populated by loadLevel)
        let platforms, enemies, powerups, questionBlocks, coins, flag, boss;
        
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') e.preventDefault();

            // Pause toggle
            if (e.key === 'p' || e.key === 'P') {
                if      (gamePhase === 'playing') gamePhase = 'paused';
                else if (gamePhase === 'paused')  gamePhase = 'playing';
            }

            // Advance from overlay screens
            if (e.key === 'Enter') {
                if (gamePhase === 'level_complete') {
                    currentLevelIndex++;
                    loadLevel(currentLevelIndex);
                } else if (gamePhase === 'game_over') {
                    gameState.lives = 3;
                    gameState.score = 0;
                    currentLevelIndex = 0;
                    updateLives();
                    updateScore();
                    loadLevel(0);
                } else if (gamePhase === 'game_won') {
                    location.reload();
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Right-click shoots a fireball when the player has the fire power
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (!player.powered) return;
            fireballs.push({
                x: player.facing === 1 ? player.x + player.width - 4 : player.x - 8,
                y: player.y + player.height / 2 - 6,
                width: 12,
                height: 12,
                velocityX: player.facing * 9,
                traveled: 0
            });
        });
        
        function initGame() {
            player.character = selectedCharacter;
            currentLevelIndex = 0;
            gameState.lives = 3;
            gameState.score = 0;
            updateLives();
            updateScore();
            loadLevel(0);
            gameLoop();
        }
        
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }
        
        function updateCamera() {
            camera.x = player.x - canvas.width / 2 + player.width / 2;
            camera.x = Math.max(0, Math.min(camera.x, LEVEL_WIDTH - canvas.width));
            camera.y = 0;
        }
        
        function update() {
            if (gamePhase !== 'playing') return;

            player.velocityX = 0;
            player.ducking = false;
            
            if (keys['ArrowLeft']) {
                player.velocityX = -player.speed;
                player.facing = -1;
            }
            if (keys['ArrowRight']) {
                player.velocityX = player.speed;
                player.facing = 1;
            }
            if (keys['ArrowDown'] && player.onGround) {
                player.ducking = true;
            }
            
            if (keys[' '] && player.onGround) {
                player.velocityY = -player.jumpPower;
                player.onGround = false;
            }
            
            if (keys[' '] && player.canWallJump && !player.onGround) {
                player.velocityY = -player.jumpPower;
                player.velocityX = player.facing === 1 ? -player.speed * 2 : player.speed * 2;
                player.canWallJump = false;
            }
            
            player.velocityY += player.gravity;
            player.x += player.velocityX;
            player.y += player.velocityY;
            
            player.onGround = false;
            player.canWallJump = false;
            
            platforms.forEach(platform => {
                if (checkCollision(player, platform)) {
                    if (player.velocityY > 0 && player.y + player.height - player.velocityY <= platform.y) {
                        player.y = platform.y - player.height;
                        player.velocityY = 0;
                        player.onGround = true;
                    }
                    else if (player.velocityY < 0 && player.y - player.velocityY >= platform.y + platform.height) {
                        player.y = platform.y + platform.height;
                        player.velocityY = 0;
                    }
                    else if (platform.type === 'wall') {
                        if (player.x < platform.x) {
                            player.x = platform.x - player.width;
                            player.canWallJump = true;
                            player.facing = 1;
                        } else {
                            player.x = platform.x + platform.width;
                            player.canWallJump = true;
                            player.facing = -1;
                        }
                        player.velocityY *= 0.9;
                    }
                }
            });
            
            // Enemies move now!
            enemies.forEach((enemy, index) => {
                enemy.x += enemy.velocityX;

                // Flying bat — sine-wave vertical motion, no platform checks
                if (enemy.type === 'fly') {
                    enemy.wave += 0.05;
                    enemy.y = enemy.baseY + Math.sin(enemy.wave) * enemy.amplitude;
                } else {
                    // Bounce off level boundaries and platform edges
                    if (enemy.x <= 20 || enemy.x >= LEVEL_WIDTH - 50) {
                        enemy.velocityX *= -1;
                    }

                    // Check for platform edges and bounce
                    platforms.forEach(platform => {
                        if (platform.type !== 'wall' && enemy.y + enemy.height >= platform.y &&
                            enemy.y + enemy.height <= platform.y + 10 &&
                            enemy.x + enemy.width > platform.x && enemy.x < platform.x + platform.width) {
                            if (enemy.x <= platform.x + 5 || enemy.x + enemy.width >= platform.x + platform.width - 5) {
                                enemy.velocityX *= -1;
                            }
                        }
                    });
                }

                if (checkCollision(player, enemy)) {
                    // Stomping works on all enemy types; fly enemies die to any stomp from above
                    if (player.velocityY > 0 && player.y + player.height - player.velocityY <= enemy.y + 10) {
                        enemies.splice(index, 1);
                        player.velocityY = -8;
                        const color = enemy.type === 'goomba' ? '#8B4513' : enemy.type === 'fly' ? '#556688' : '#228B22';
                        createParticles(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, color);
                        gameState.score += 100;
                        updateScore();
                    } else {
                        loseLife();
                    }
                }
            });
            
            // Question block collision — solid from all sides; hit from below spawns item
            questionBlocks.forEach(block => {
                if (checkCollision(player, block)) {
                    // Land on top
                    if (player.velocityY > 0 && player.y + player.height - player.velocityY <= block.y) {
                        player.y = block.y - player.height;
                        player.velocityY = 0;
                        player.onGround = true;
                    }
                    // Hit from underneath
                    else if (player.velocityY < 0 && player.y - player.velocityY >= block.y + block.height) {
                        player.y = block.y + block.height;
                        player.velocityY = 0;
                        if (!block.hit) {
                            block.hit = true;
                            // Spawn item centred just above the block
                            powerups.push({
                                x: block.x + (block.width - 24) / 2,
                                y: block.y - 28,
                                width: 24,
                                height: 24,
                                type: block.item,
                                collected: false
                            });
                            createParticles(block.x + block.width / 2, block.y, '#FFD700');
                        }
                    }
                    // Side collision
                    else {
                        if (player.x + player.width / 2 < block.x + block.width / 2) {
                            player.x = block.x - player.width;
                        } else {
                            player.x = block.x + block.width;
                        }
                    }
                }
            });

            powerups.forEach(powerup => {
                if (!powerup.collected && checkCollision(player, powerup)) {
                    powerup.collected = true;
                    if (powerup.type === 'flower') {
                        player.powered = true;
                        createParticles(powerup.x + powerup.width / 2, powerup.y + powerup.height / 2, '#FF4444');
                    } else {
                        gameState.lives++;
                        updateLives();
                        createParticles(powerup.x + powerup.width / 2, powerup.y + powerup.height / 2, '#FFD700');
                    }
                }
            });
            
            // Collect coins
            coins.forEach(coin => {
                if (!coin.collected && checkCollision(player, coin)) {
                    coin.collected = true;
                    gameState.score += 50;
                    updateScore();
                    createParticles(coin.x + 7, coin.y + 7, '#FFD700');
                }
            });

            // Update fireballs — move, kill enemies and boss, remove when spent
            for (let fi = fireballs.length - 1; fi >= 0; fi--) {
                const fb = fireballs[fi];
                fb.x += fb.velocityX;
                fb.traveled += Math.abs(fb.velocityX);

                if (fb.traveled > 700 || fb.x < 0 || fb.x > LEVEL_WIDTH) {
                    fireballs.splice(fi, 1);
                    continue;
                }

                let hit = false;
                for (let ei = enemies.length - 1; ei >= 0; ei--) {
                    if (checkCollision(fb, enemies[ei])) {
                        const color = enemies[ei].type === 'goomba' ? '#8B4513' : enemies[ei].type === 'fly' ? '#556688' : '#228B22';
                        createParticles(enemies[ei].x + enemies[ei].width / 2, enemies[ei].y + enemies[ei].height / 2, color);
                        createParticles(fb.x + 6, fb.y + 6, '#FF6600');
                        enemies.splice(ei, 1);
                        gameState.score += 200;
                        updateScore();
                        hit = true;
                        break;
                    }
                }
                // Fireball can also hurt the boss
                if (!hit && boss && !boss.defeated && boss.stunTimer === 0 && checkCollision(fb, boss)) {
                    boss.health--;
                    boss.stunTimer = 50;
                    createParticles(fb.x + 6, fb.y + 6, '#FF6600');
                    if (boss.health <= 0) {
                        boss.defeated = true;
                        gameState.score += 1000;
                        updateScore();
                        createParticles(boss.x + boss.width / 2, boss.y + boss.height / 2, '#FF6600');
                    }
                    hit = true;
                }
                if (hit) fireballs.splice(fi, 1);
            }

            // Boss update (level 3)
            if (boss && !boss.defeated) {
                boss.x += boss.velocityX;
                if (boss.x <= LEVEL_WIDTH - 480 || boss.x + boss.width >= LEVEL_WIDTH - 120) {
                    boss.velocityX *= -1;
                }
                if (boss.stunTimer > 0) boss.stunTimer--;

                if (checkCollision(player, boss)) {
                    // Stomp boss from above
                    if (player.velocityY > 0 && player.y + player.height - player.velocityY <= boss.y + 12 && boss.stunTimer === 0) {
                        boss.health--;
                        boss.stunTimer = 60;
                        player.velocityY = -10;
                        createParticles(boss.x + boss.width / 2, boss.y, '#FF6600');
                        if (boss.health <= 0) {
                            boss.defeated = true;
                            gameState.score += 1000;
                            updateScore();
                            for (let i = 0; i < 3; i++) createParticles(boss.x + boss.width / 2, boss.y + boss.height / 2, '#FF6600');
                        }
                    } else if (boss.stunTimer === 0) {
                        loseLife();
                    }
                }
            }

            // Flag / win — boss must be defeated on level 3
            if (checkCollision(player, flag) && (!boss || boss.defeated)) {
                winLevel();
            }
            
            particles.forEach((particle, index) => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life--;
                if (particle.life <= 0) {
                    particles.splice(index, 1);
                }
            });
            
            if (player.y > canvas.height) {
                loseLife();
            }
            
            updateCamera();
        }
        
        // Function to draw brick texture
        function drawBrickPlatform(x, y, width, height) {
            const brickWidth = 30;
            const brickHeight = 15;
            
            for (let row = 0; row < Math.ceil(height / brickHeight); row++) {
                for (let col = 0; col < Math.ceil(width / brickWidth); col++) {
                    let brickX = x + col * brickWidth;
                    let brickY = y + row * brickHeight;
                    
                    // Offset every other row for brick pattern
                    if (row % 2 === 1) {
                        brickX -= brickWidth / 2;
                    }
                    
                    // Main brick color
                    ctx.fillStyle = '#CD853F';
                    ctx.fillRect(brickX, brickY, brickWidth - 2, brickHeight - 2);
                    
                    // Brick highlight (top-left)
                    ctx.fillStyle = '#DEB887';
                    ctx.fillRect(brickX, brickY, brickWidth - 2, 3);
                    ctx.fillRect(brickX, brickY, 3, brickHeight - 2);
                    
                    // Brick shadow (bottom-right)
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(brickX, brickY + brickHeight - 4, brickWidth - 2, 2);
                    ctx.fillRect(brickX + brickWidth - 4, brickY, 2, brickHeight - 2);
                    
                    // Mortar lines
                    ctx.fillStyle = '#696969';
                    ctx.fillRect(brickX + brickWidth - 2, brickY, 2, brickHeight);
                    ctx.fillRect(brickX, brickY + brickHeight - 2, brickWidth, 2);
                }
            }
        }
        
        function drawPlayerSprite(x, y, character, facing) {
            if (character === 'mario') {
                // Hat brim (darker red, full-width)
                ctx.fillStyle = '#AA0000';
                ctx.fillRect(x + 0, y + 5, 32, 3);
                // Hat crown
                ctx.fillStyle = '#CC0000';
                ctx.fillRect(x + 4, y + 0, 24, 8);

                // Head (flesh)
                ctx.fillStyle = '#FFDBAC';
                ctx.beginPath();
                ctx.arc(x + 16, y + 14, 7, 0, Math.PI * 2);
                ctx.fill();

                // Eyes: white + blue iris + black pupil
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(x + 9,  y + 11, 5, 4);
                ctx.fillRect(x + 18, y + 11, 5, 4);
                ctx.fillStyle = '#3355EE';
                ctx.fillRect(x + 10, y + 12, 3, 3);
                ctx.fillRect(x + 19, y + 12, 3, 3);
                ctx.fillStyle = '#000000';
                ctx.fillRect(x + 10, y + 12, 2, 2);
                ctx.fillRect(x + 19, y + 12, 2, 2);

                // Mustache (brown bar)
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(x + 9, y + 17, 14, 3);

                // Red shirt body
                ctx.fillStyle = '#FF2222';
                ctx.fillRect(x + 6, y + 21, 20, 7);
                // Blue overall straps over shirt
                ctx.fillStyle = '#1133BB';
                ctx.fillRect(x + 11, y + 21, 4, 7);
                ctx.fillRect(x + 17, y + 21, 4, 7);

                // Blue pants legs
                ctx.fillStyle = '#1133BB';
                ctx.fillRect(x + 6,  y + 27, 9, 6);
                ctx.fillRect(x + 17, y + 27, 9, 6);

                // Brown shoes
                ctx.fillStyle = '#6B3A2A';
                ctx.fillRect(x + 4,  y + 31, 12, 3);
                ctx.fillRect(x + 16, y + 31, 12, 3);

            } else if (character === 'luigi') {
                // Hat brim (dark green)
                ctx.fillStyle = '#1A4A1A';
                ctx.fillRect(x + 0, y + 5, 32, 3);
                // Hat crown (brighter green)
                ctx.fillStyle = '#2D7A2D';
                ctx.fillRect(x + 4, y + 0, 24, 8);

                // Head (flesh)
                ctx.fillStyle = '#FFDBAC';
                ctx.beginPath();
                ctx.arc(x + 16, y + 14, 7, 0, Math.PI * 2);
                ctx.fill();

                // Eyes: white + brown iris + black pupil
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(x + 9,  y + 11, 5, 4);
                ctx.fillRect(x + 18, y + 11, 5, 4);
                ctx.fillStyle = '#6B3A10';
                ctx.fillRect(x + 10, y + 12, 3, 3);
                ctx.fillRect(x + 19, y + 12, 3, 3);
                ctx.fillStyle = '#000000';
                ctx.fillRect(x + 10, y + 12, 2, 2);
                ctx.fillRect(x + 19, y + 12, 2, 2);

                // Mustache (darker, thinner)
                ctx.fillStyle = '#5A3010';
                ctx.fillRect(x + 9, y + 17, 14, 3);

                // Green shirt body
                ctx.fillStyle = '#009900';
                ctx.fillRect(x + 6, y + 21, 20, 7);
                // Blue overall straps
                ctx.fillStyle = '#1133BB';
                ctx.fillRect(x + 11, y + 21, 4, 7);
                ctx.fillRect(x + 17, y + 21, 4, 7);

                // Blue pants legs
                ctx.fillStyle = '#1133BB';
                ctx.fillRect(x + 6,  y + 27, 9, 6);
                ctx.fillRect(x + 17, y + 27, 9, 6);

                // Dark green shoes (matches home screen)
                ctx.fillStyle = '#1A4A1A';
                ctx.fillRect(x + 4,  y + 31, 12, 3);
                ctx.fillRect(x + 16, y + 31, 12, 3);

            } else if (character === 'donkey') {
                // Heavy brow ridge
                ctx.fillStyle = '#4A2810';
                ctx.fillRect(x + 2, y + 2, 28, 5);
                // Large dark-brown head
                ctx.fillStyle = '#6B3A1A';
                ctx.beginPath();
                ctx.arc(x + 16, y + 11, 11, 0, Math.PI * 2);
                ctx.fill();

                // Cream face oval (matches home screen)
                ctx.fillStyle = '#C8956A';
                ctx.beginPath();
                ctx.ellipse(x + 16, y + 13, 7, 9, 0, 0, Math.PI * 2);
                ctx.fill();

                // Eyes: white sclera + black pupil + shine
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(x + 9,  y + 8, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 23, y + 8, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(x + 9,  y + 8, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 23, y + 8, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(x + 8,  y + 7, 1, 1);
                ctx.fillRect(x + 22, y + 7, 1, 1);

                // Nostrils
                ctx.fillStyle = '#2A1005';
                ctx.fillRect(x + 12, y + 16, 2, 2);
                ctx.fillRect(x + 18, y + 16, 2, 2);

                // Body: dark-brown with lighter chest center
                ctx.fillStyle = '#6B3A1A';
                ctx.fillRect(x + 3, y + 21, 26, 12);
                ctx.fillStyle = '#8B5A3A';
                ctx.fillRect(x + 8, y + 22, 16,  9);

                // Red tie with darker knot
                ctx.fillStyle = '#CC0000';
                ctx.fillRect(x + 14, y + 21,  4, 12);
                ctx.fillStyle = '#990000';
                ctx.fillRect(x + 13, y + 21,  6,  3);

                // Legs
                ctx.fillStyle = '#6B3A1A';
                ctx.fillRect(x + 5,  y + 32, 9, 4);
                ctx.fillRect(x + 18, y + 32, 9, 4);
            }
        }
        
        function render() {
            const bgStyle = LEVELS[currentLevelIndex].bgStyle;

            // ── Background ──────────────────────────────────────────────────
            if (bgStyle === 'sky') {
                const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
                g.addColorStop(0,   '#8ECFFF');
                g.addColorStop(0.6, '#D4EEFF');
                g.addColorStop(1,   '#F0F8FF');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (bgStyle === 'castle') {
                const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
                g.addColorStop(0,    '#0D0020');
                g.addColorStop(0.5,  '#2A0040');
                g.addColorStop(0.85, '#5C1010');
                g.addColorStop(1,    '#8B2020');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // Stars
                ctx.fillStyle = 'rgba(255,255,220,0.8)';
                [[80,25],[180,55],[280,18],[420,42],[490,78],[145,88],[330,65],
                 [580,28],[690,52],[240,108],[50,118],[390,12],[640,85],[740,38],[540,118]]
                .forEach(([sx,sy]) => ctx.fillRect(sx, sy, 2, 2));
            } else {
                // Plains (default)
                const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
                g.addColorStop(0,   '#87CEEB');
                g.addColorStop(0.7, '#87CEEB');
                g.addColorStop(0.7, '#90EE90');
                g.addColorStop(1,   '#90EE90');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // ── Parallax clouds (plains + sky only) ─────────────────────────
            if (bgStyle !== 'castle') {
                const cloudAlpha = bgStyle === 'sky' ? 0.8 : 0.6;
                ctx.fillStyle = `rgba(255,255,255,${cloudAlpha})`;
                const cloudOffset = camera.x * 0.3;
                [[150,100,30,40,30],[500,150,35,45,35],[900,120,35,45,35],[1300,100,30,40,30]]
                .forEach(([cx,cy,r1,r2,r3]) => {
                    ctx.beginPath();
                    ctx.arc(cx - cloudOffset,      cy, r1, 0, Math.PI * 2);
                    ctx.arc(cx + r1 - cloudOffset, cy, r2, 0, Math.PI * 2);
                    ctx.arc(cx + r1 + r2 - cloudOffset, cy, r3, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
            
            ctx.save();
            ctx.translate(-camera.x, -camera.y);
            
            platforms.forEach(platform => {
                if (platform.type === 'ground') {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                    ctx.fillStyle = '#654321';
                    for (let i = 0; i < platform.width; i += 30) {
                        ctx.fillRect(platform.x + i, platform.y, 28, 10);
                    }
                } else if (platform.type === 'wall') {
                    ctx.fillStyle = '#666';
                    ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                } else {
                    // Draw brick texture for platforms
                    drawBrickPlatform(platform.x, platform.y, platform.width, platform.height);
                }
            });
            
            // Draw question blocks
            questionBlocks.forEach(block => {
                if (!block.hit) {
                    // Yellow body
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(block.x, block.y, block.width, block.height);
                    // Inner lighter face
                    ctx.fillStyle = '#FFE84D';
                    ctx.fillRect(block.x + 3, block.y + 3, block.width - 6, block.height - 6);
                    // Dark gold border — top/left (highlight) and bottom/right (shadow)
                    ctx.fillStyle = '#CC8800';
                    ctx.fillRect(block.x,                       block.y,                        block.width, 3); // top
                    ctx.fillRect(block.x,                       block.y + block.height - 3,     block.width, 3); // bottom
                    ctx.fillRect(block.x,                       block.y,                        3, block.height); // left
                    ctx.fillRect(block.x + block.width - 3,     block.y,                        3, block.height); // right
                    // White ? mark
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 16px "Press Start 2P", cursive';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('?', block.x + block.width / 2, block.y + block.height / 2 + 1);
                } else {
                    // Hit / empty block — dark brown
                    ctx.fillStyle = '#7A5C00';
                    ctx.fillRect(block.x, block.y, block.width, block.height);
                    ctx.fillStyle = '#5A4200';
                    ctx.fillRect(block.x + 3, block.y + 3, block.width - 6, block.height - 6);
                    ctx.fillStyle = '#3A2C00';
                    ctx.fillRect(block.x,                       block.y,                        block.width, 3);
                    ctx.fillRect(block.x,                       block.y + block.height - 3,     block.width, 3);
                    ctx.fillRect(block.x,                       block.y,                        3, block.height);
                    ctx.fillRect(block.x + block.width - 3,     block.y,                        3, block.height);
                }
            });

            // ── Coins ────────────────────────────────────────────────────────
            coins.forEach(coin => {
                if (!coin.collected) {
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(coin.x + 7, coin.y + 7, 7, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#FFFF88';
                    ctx.beginPath();
                    ctx.arc(coin.x + 4, coin.y + 4, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#CC8800';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(coin.x + 7, coin.y + 7, 7, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });

            // ── Flag / goal ──────────────────────────────────────────────────
            ctx.fillStyle = '#666';
            ctx.fillRect(flag.x + 5, flag.y, 8, flag.height);
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.moveTo(flag.x + 13, flag.y + 10);
            ctx.lineTo(flag.x + 40, flag.y + 25);
            ctx.lineTo(flag.x + 13, flag.y + 40);
            ctx.closePath();
            ctx.fill();
            
            enemies.forEach(enemy => {
                if (enemy.type === 'goomba') {
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.ellipse(enemy.x + 15, enemy.y + 12, 13, 11, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#654321';
                    ctx.fillRect(enemy.x + 9, enemy.y + 8, 3, 3);
                    ctx.fillRect(enemy.x + 18, enemy.y + 7, 3, 3);
                    ctx.fillRect(enemy.x + 27, enemy.y + 8, 3, 3);
                    
                    ctx.fillStyle = '#654321';
                    ctx.fillRect(enemy.x + 6, enemy.y + 22, 7, 6);
                    ctx.fillRect(enemy.x + 17, enemy.y + 22, 7, 6);
                    
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(enemy.x + 10, enemy.y + 10, 4, 4);
                    ctx.fillRect(enemy.x + 20, enemy.y + 10, 4, 4);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(enemy.x + 11, enemy.y + 11, 2, 2);
                    ctx.fillRect(enemy.x + 21, enemy.y + 11, 2, 2);
                } else if (enemy.type === 'koopa') {
                    ctx.fillStyle = '#228B22';
                    ctx.beginPath();
                    ctx.ellipse(enemy.x + 15, enemy.y + 10, 12, 10, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = '#1a6b1a';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(enemy.x + 15, enemy.y + 10, 6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(enemy.x + 15, enemy.y + 10, 10, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(enemy.x + 9, enemy.y + 18, 12, 8);
                    
                    ctx.fillStyle = '#FF6B35';
                    ctx.fillRect(enemy.x + 9, enemy.y + 18, 4, 4);
                    
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(enemy.x + 10, enemy.y + 12, 3, 3);
                    ctx.fillRect(enemy.x + 17, enemy.y + 12, 3, 3);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(enemy.x + 11, enemy.y + 13, 1.5, 1.5);
                    ctx.fillRect(enemy.x + 18, enemy.y + 13, 1.5, 1.5);
                    
                    ctx.fillStyle = '#FF6B35';
                    ctx.fillRect(enemy.x + 6, enemy.y + 26, 6, 3);
                    ctx.fillRect(enemy.x + 18, enemy.y + 26, 6, 3);
                } else if (enemy.type === 'fly') {
                    // Bat — animated wings using Date.now()
                    const ecx = enemy.x + enemy.width / 2;
                    const ecy = enemy.y + enemy.height / 2;
                    const wingUp = Math.sin(Date.now() / 140) > 0;
                    ctx.fillStyle = '#556688';
                    // Left wing
                    ctx.beginPath();
                    ctx.moveTo(ecx, ecy + 2);
                    ctx.lineTo(ecx - 16, wingUp ? ecy - 9  : ecy + 9);
                    ctx.lineTo(ecx - 7,  ecy + 3);
                    ctx.closePath();
                    ctx.fill();
                    // Right wing
                    ctx.beginPath();
                    ctx.moveTo(ecx, ecy + 2);
                    ctx.lineTo(ecx + 16, wingUp ? ecy - 9  : ecy + 9);
                    ctx.lineTo(ecx + 7,  ecy + 3);
                    ctx.closePath();
                    ctx.fill();
                    // Body
                    ctx.fillStyle = '#334466';
                    ctx.beginPath();
                    ctx.ellipse(ecx, ecy + 4, 7, 9, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Red eyes
                    ctx.fillStyle = '#FF2222';
                    ctx.beginPath(); ctx.arc(ecx - 3, ecy, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(ecx + 3, ecy, 2.5, 0, Math.PI * 2); ctx.fill();
                }
            });

            // ── Boss (level 3) ────────────────────────────────────────────────
            if (boss && !boss.defeated) {
                const bx = boss.x, by = boss.y, bw = boss.width, bh = boss.height;
                const stun = boss.stunTimer > 0;
                const bc = stun ? '#FF8800' : '#228B22';
                // Body
                ctx.fillStyle = bc;
                ctx.fillRect(bx + 6, by + 22, bw - 12, bh - 22);
                // Belly
                ctx.fillStyle = stun ? '#FFCC44' : '#FFCC66';
                ctx.fillRect(bx + 16, by + 30, bw - 32, bh - 42);
                // Head
                ctx.fillStyle = bc;
                ctx.fillRect(bx + 4, by, bw - 8, 26);
                // Snout
                ctx.fillStyle = stun ? '#DD6600' : '#33AA33';
                ctx.fillRect(bx + 14, by + 15, bw - 28, 9);
                ctx.fillStyle = '#000';
                ctx.fillRect(bx + 18, by + 17, 5, 5);
                ctx.fillRect(bx + bw - 23, by + 17, 5, 5);
                // Eyes
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(bx + 10, by + 5, 10, 8);
                ctx.fillRect(bx + bw - 20, by + 5, 10, 8);
                ctx.fillStyle = '#000';
                ctx.fillRect(bx + 14, by + 7, 5, 5);
                ctx.fillRect(bx + bw - 16, by + 7, 5, 5);
                // Angry brows
                ctx.fillStyle = '#000';
                ctx.fillRect(bx + 8,       by + 3, 14, 3);
                ctx.fillRect(bx + bw - 22, by + 3, 14, 3);
                // Back spikes
                ctx.fillStyle = '#FF6600';
                for (let s = 0; s < 4; s++) {
                    const sx = bx + 8 + s * 14;
                    ctx.beginPath();
                    ctx.moveTo(sx, by + 22); ctx.lineTo(sx + 7, by + 5); ctx.lineTo(sx + 14, by + 22);
                    ctx.fill();
                }
                // Arms
                ctx.fillStyle = bc;
                ctx.fillRect(bx - 10, by + 24, 18, 14);
                ctx.fillRect(bx + bw - 8, by + 24, 18, 14);
                // Claws
                ctx.fillStyle = '#AA4400';
                [-10, -4, 2].forEach(o => ctx.fillRect(bx + o, by + 36, 5, 8));
                [bw - 6, bw, bw + 6].forEach(o => ctx.fillRect(bx + o, by + 36, 5, 8));
                // Legs
                ctx.fillStyle = bc;
                ctx.fillRect(bx + 8,       by + bh - 22, 18, 22);
                ctx.fillRect(bx + bw - 26, by + bh - 22, 18, 22);
                // Feet
                ctx.fillStyle = '#AA4400';
                ctx.fillRect(bx + 4,       by + bh - 6, 26, 8);
                ctx.fillRect(bx + bw - 30, by + bh - 6, 26, 8);
                // Health bar
                const hbW = 80, hbH = 8;
                const hbX = bx + (bw - hbW) / 2, hbY = by - 20;
                ctx.fillStyle = '#333'; ctx.fillRect(hbX, hbY, hbW, hbH);
                ctx.fillStyle = '#FF2222'; ctx.fillRect(hbX, hbY, hbW * boss.health / boss.maxHealth, hbH);
                ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(hbX, hbY, hbW, hbH);
                ctx.fillStyle = '#FF2222';
                ctx.font = 'bold 7px "Press Start 2P", cursive';
                ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                ctx.fillText('BOSS', bx + bw / 2, hbY - 2);
            }
            
            powerups.forEach(powerup => {
                if (!powerup.collected) {
                    const px = powerup.x;
                    const py = powerup.y;
                    const pw = powerup.width;   // 24 for spawned, 25 for static
                    const ph = powerup.height;
                    const pcx = px + pw / 2;
                    const pcy = py + ph / 2;

                    if (powerup.type === 'mushroom') {
                        // Stem (cream)
                        ctx.fillStyle = '#FFDBAC';
                        ctx.fillRect(pcx - 7, pcy, 14, ph / 2 + 2);
                        // Stem bottom feet
                        ctx.fillStyle = '#EEC98A';
                        ctx.fillRect(pcx - 9, py + ph - 6, 6, 6);
                        ctx.fillRect(pcx + 3, py + ph - 6, 6, 6);
                        // Cap (red semicircle)
                        ctx.fillStyle = '#EE1111';
                        ctx.beginPath();
                        ctx.arc(pcx, pcy - 1, pw / 2 + 1, Math.PI, 0);
                        ctx.fill();
                        // Cap edge
                        ctx.fillStyle = '#CC0000';
                        ctx.fillRect(px, pcy - 2, pw, 4);
                        // White spots on cap
                        ctx.fillStyle = '#FFFFFF';
                        ctx.beginPath();
                        ctx.arc(pcx - 5, pcy - 7, 3, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(pcx + 5, pcy - 8, 3, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(pcx, pcy - 3, 2, 0, Math.PI * 2);
                        ctx.fill();
                        // Eyes on stem
                        ctx.fillStyle = '#000000';
                        ctx.fillRect(pcx - 5, pcy + 2, 2, 2);
                        ctx.fillRect(pcx + 3, pcy + 2, 2, 2);

                    } else if (powerup.type === 'flower') {
                        // Stem (green)
                        ctx.fillStyle = '#22AA22';
                        ctx.fillRect(pcx - 2, pcy + 2, 4, ph / 2 + 2);
                        // Leaf
                        ctx.fillStyle = '#33CC33';
                        ctx.fillRect(pcx - 6, pcy + 4, 5, 3);
                        ctx.fillRect(pcx + 1, pcy + 7, 5, 3);
                        // 4 petals alternating red / white
                        const petalOffsets = [
                            [0, -8],   // top
                            [8,  0],   // right
                            [0,  8],   // bottom
                            [-8, 0],   // left
                        ];
                        petalOffsets.forEach(([dx, dy], i) => {
                            ctx.fillStyle = i % 2 === 0 ? '#FF2222' : '#FFFFFF';
                            ctx.beginPath();
                            ctx.arc(pcx + dx, pcy - 4 + dy, 5, 0, Math.PI * 2);
                            ctx.fill();
                        });
                        // Dark outline ring on petals (subtle)
                        petalOffsets.forEach(([dx, dy]) => {
                            ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.arc(pcx + dx, pcy - 4 + dy, 5, 0, Math.PI * 2);
                            ctx.stroke();
                        });
                        // Yellow centre
                        ctx.fillStyle = '#FFD700';
                        ctx.beginPath();
                        ctx.arc(pcx, pcy - 4, 5, 0, Math.PI * 2);
                        ctx.fill();
                        // Centre dot
                        ctx.fillStyle = '#CC8800';
                        ctx.beginPath();
                        ctx.arc(pcx, pcy - 4, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
            
            // Draw fireballs
            fireballs.forEach(fb => {
                // Outer orange glow
                ctx.fillStyle = '#FF6600';
                ctx.beginPath();
                ctx.arc(fb.x + 6, fb.y + 6, 7, 0, Math.PI * 2);
                ctx.fill();
                // Mid yellow layer
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(fb.x + 6, fb.y + 6, 4, 0, Math.PI * 2);
                ctx.fill();
                // White-hot core
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(fb.x + 6, fb.y + 6, 2, 0, Math.PI * 2);
                ctx.fill();
            });

            let playerHeight = player.ducking ? player.height / 2 : player.height;
            let playerY = player.ducking ? player.y + player.height / 2 : player.y;

            // Fire-power aura — orange ring around the player when powered
            if (player.powered) {
                const auraCx = player.x + player.width / 2;
                const auraCy = playerY + playerHeight / 2;
                const auraR = player.width / 2 + 5;
                ctx.save();
                ctx.globalAlpha = 0.4;
                ctx.strokeStyle = '#FF6600';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(auraCx, auraCy, auraR, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 0.2;
                ctx.fillStyle = '#FF6600';
                ctx.beginPath();
                ctx.arc(auraCx, auraCy, auraR, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                // Small "FIRE" label above head
                ctx.fillStyle = '#FF4400';
                ctx.font = 'bold 8px "Press Start 2P", cursive';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('FIRE', auraCx, playerY - 2);
            }

            drawPlayerSprite(player.x, playerY, player.character, player.facing);
            
            particles.forEach(particle => {
                ctx.fillStyle = particle.color;
                ctx.globalAlpha = particle.life / 30;
                ctx.fillRect(particle.x, particle.y, 4, 4);
                ctx.globalAlpha = 1;
            });
            
            ctx.restore(); // end camera transform

            // ── HUD overlay — pause / level-complete / game-over / you-win ────
            if (gamePhase !== 'playing') {
                // Dim the scene
                ctx.fillStyle = 'rgba(0,0,0,0.62)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const cx = canvas.width / 2, cy = canvas.height / 2;

                if (gamePhase === 'paused') {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 28px "Press Start 2P", cursive';
                    ctx.fillText('PAUSED', cx, cy - 30);
                    ctx.font = '11px "Press Start 2P", cursive';
                    ctx.fillStyle = '#CCCCCC';
                    ctx.fillText('Press P to resume', cx, cy + 20);

                } else if (gamePhase === 'level_complete') {
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 22px "Press Start 2P", cursive';
                    ctx.fillText('LEVEL COMPLETE!', cx, cy - 60);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = '12px "Press Start 2P", cursive';
                    ctx.fillText(LEVELS[currentLevelIndex].name + ' cleared', cx, cy - 15);
                    ctx.fillText('Score: ' + gameState.score, cx, cy + 25);
                    ctx.fillStyle = '#AAFFAA';
                    ctx.font = '10px "Press Start 2P", cursive';
                    ctx.fillText('Press ENTER for next level', cx, cy + 68);

                } else if (gamePhase === 'game_over') {
                    ctx.fillStyle = '#FF3333';
                    ctx.font = 'bold 28px "Press Start 2P", cursive';
                    ctx.fillText('GAME OVER', cx, cy - 60);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = '12px "Press Start 2P", cursive';
                    ctx.fillText('Score: ' + gameState.score, cx, cy - 10);
                    ctx.fillStyle = '#FFAAAA';
                    ctx.font = '10px "Press Start 2P", cursive';
                    ctx.fillText('Press ENTER to try again', cx, cy + 40);

                } else if (gamePhase === 'game_won') {
                    // Animated shimmer — just cycle between gold/white
                    ctx.fillStyle = Date.now() % 1000 < 500 ? '#FFD700' : '#FFFFFF';
                    ctx.font = 'bold 28px "Press Start 2P", cursive';
                    ctx.fillText('YOU WIN!', cx, cy - 80);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = '12px "Press Start 2P", cursive';
                    ctx.fillText('All 3 worlds cleared!', cx, cy - 30);
                    ctx.fillText('Final Score: ' + gameState.score, cx, cy + 15);
                    ctx.fillStyle = '#AAFFAA';
                    ctx.font = '10px "Press Start 2P", cursive';
                    ctx.fillText('Press ENTER to play again', cx, cy + 60);
                }
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 30,
                    color: color
                });
            }
        }
        
        function loseLife() {
            gameState.lives--;
            updateLives();
            if (gameState.lives <= 0) {
                gamePhase = 'game_over';
            } else {
                loadLevel(currentLevelIndex); // respawn with level reset
            }
        }

        function updateLives() {
            let hearts = '';
            for (let i = 0; i < gameState.lives; i++) hearts += '❤️';
            document.getElementById('lives').textContent = hearts;
        }

        function updateScore() {
            document.getElementById('score').textContent = 'SCORE ' + gameState.score;
        }

        function winLevel() {
            if (currentLevelIndex < LEVELS.length - 1) {
                gamePhase = 'level_complete';
            } else {
                gamePhase = 'game_won';
            }
        }
    </script>
</body>
</html>
